steps:
  # 1. Construir la imagen del contenedor
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/frontend-dashboard/dashboard-inclusion-social:$COMMIT_SHA', '.']

  # 2. Subir la imagen a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/frontend-dashboard/dashboard-inclusion-social:$COMMIT_SHA']

  # 3. Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dashboard-inclusion-social' # Este será el nombre del servicio y parte de la URL
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/frontend-dashboard/dashboard-inclusion-social:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - '753170017712-compute@developer.gserviceaccount.com'

# Configuración de logging
options:
  logging: CLOUD_LOGGING_ONLY

# Imágenes que se guardarán
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/frontend-dashboard/dashboard-inclusion-social:$COMMIT_SHA'
