server {
    # Cloud Run espera que la aplicación escuche en el puerto 8080 (o el definido en la variable PORT)
    listen 8080;
    server_name localhost;

    # Configuración de la ubicación raíz
    location / {
        # Directorio donde copiamos nuestros archivos estáticos
        root /usr/share/nginx/html;
        
        # Archivos a servir por defecto
        index index.html index.htm;
        
        # Intenta servir el archivo solicitado ($uri), si no existe, sirve el directorio,
        # y si no, vuelve a index.html (útil para SPAs, aunque aquí es estático).
        try_files $uri $uri/ /index.html;
    }

    # Manejo de errores del servidor
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
